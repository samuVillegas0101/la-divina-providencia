<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1100" role="img" aria-label="Foto mirador y fuego pendiente">
  <defs>
    <linearGradient id="sky" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#080706"/>
      <stop offset="0.48" stop-color="#2a1a12"/>
      <stop offset="1" stop-color="#060504"/>
    </linearGradient>
    <radialGradient id="fire" cx="58%" cy="70%" r="36%">
      <stop offset="0" stop-color="#e45324" stop-opacity="0.55"/>
      <stop offset="0.34" stop-color="#c78336" stop-opacity="0.26"/>
      <stop offset="1" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence baseFrequency="0.9" numOctaves="3" type="fractalNoise"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="table" tableValues="0 0.10"/></feComponentTransfer>
    </filter>
  </defs>
  <rect width="1600" height="1100" fill="url(#sky)"/>
  <path d="M0 650 C250 470 400 540 600 450 C820 350 1040 470 1600 250 L1600 1100 L0 1100Z" fill="#0f100c" opacity="0.86"/>
  <path d="M0 740 C300 590 520 700 820 560 C1040 460 1220 620 1600 490 L1600 1100 L0 1100Z" fill="#17130e" opacity="0.92"/>
  <rect width="1600" height="1100" fill="url(#fire)"/>
  <g opacity="0.45" stroke="#c9a867" stroke-width="4">
    <line x1="1100" y1="300" x2="1550" y2="250"/><line x1="1110" y1="370" x2="1580" y2="360"/>
    <line x1="1170" y1="290" x2="1170" y2="620"/><line x1="1450" y1="260" x2="1450" y2="650"/>
  </g>
  <rect width="1600" height="1100" filter="url(#grain)"/>
  <text x="800" y="580" fill="#f1e3c6" font-family="Arial, Helvetica, sans-serif" font-size="38" font-weight="700" letter-spacing="12" text-anchor="middle" opacity="0.32">FOTO MIRADOR / FUEGO</text>
</svg>
